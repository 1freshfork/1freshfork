<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝓯𝓻𝓮𝓼𝓱𝓯𝓸𝓻𝓴 / 𝓭𝓮𝓿𝓮𝓵𝓸𝓹𝓮𝓻</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #bd00ff;
            --bg-dark: #050505;
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Анимированный фон (Mesh Gradient) --- */
        .ambient-light {
            position: absolute;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: floatOrb 10s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .orb-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: var(--primary);
            animation-duration: 15s;
        }

        .orb-2 {
            bottom: -10%;
            right: -10%;
            width: 40vw;
            height: 40vw;
            background: var(--secondary);
            animation-duration: 12s;
            animation-delay: -5s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* --- Карточка Портфолио --- */
        .portfolio {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            padding: 40px 30px;
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.5),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: cardEntrance 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            z-index: 10;
        }

        /* Аватар с эффектом свечения */
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .avatar-ring {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--primary), var(--secondary), var(--primary));
            animation: spinRing 4s linear infinite;
            mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #fff calc(100% - 2px));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #fff calc(100% - 2px));
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #1a1a1a;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 2;
        }

        .avatar-container:hover .avatar {
            transform: scale(1.05);
        }

        /* Никнейм */
        .nickname h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            margin-bottom: 25px;
            background: linear-gradient(to right, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* Социальные кнопки */
        .links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 50px;
            height: 50px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .social-btn img {
            width: 24px;
            height: 24px;
            filter: grayscale(100%) brightness(200%);
            transition: all 0.3s ease;
            z-index: 2;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .social-btn:hover {
            transform: translateY(-5px);
            border-color: transparent;
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.2);
        }

        .social-btn:hover::before {
            opacity: 1;
        }

        .social-btn:hover img {
            filter: grayscale(0%) brightness(100%);
        }

        /* --- Музыкальный плеер --- */
        .music {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }

        .music-header-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cover-wrapper {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            position: relative;
            flex-shrink: 0;
        }

        .cover-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .cover-wrapper.playing img {
            animation: rotateCover 10s linear infinite;
        }

        .track-details {
            flex: 1;
            text-align: left;
            overflow: hidden;
        }

        .track-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .track-author {
            font-size: 0.8rem;
            color: var(--text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-playlist-toggle {
            cursor: pointer;
            color: var(--text-sub);
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .btn-playlist-toggle:hover, .btn-playlist-toggle.active {
            color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Прогресс бар */
        .progress-area {
            margin-top: 5px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 10px var(--primary);
        }

        /* Кнопки управления */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding: 0 10px;
        }

        .ctrl-btn {
            cursor: pointer;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            user-select: none;
        }

        .ctrl-btn:hover {
            color: #fff;
            transform: scale(1.1);
        }

        .play-pause-btn {
            width: 45px;
            height: 45px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .play-pause-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
            transform: scale(1.05);
        }

        .pause-icon { display: none; }

        /* Плейлист Dropdown */
        .playlist-dropdown {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            margin-top: 10px;
        }

        .playlist-dropdown.show {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            cursor: pointer;
            transition: background 0.2s;
        }

        .playlist-item:last-child { border-bottom: none; }
        .playlist-item:hover { background: rgba(255, 255, 255, 0.05); }
        
        .playlist-item.current {
            background: rgba(0, 255, 204, 0.05);
            border-left: 2px solid var(--primary);
        }

        .item-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .item-title { font-size: 0.85rem; font-weight: 600; color: #fff; }
        .item-author { font-size: 0.75rem; color: var(--text-sub); }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        /* Анимации */
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes spinRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateCover {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Живой фон -->
    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <audio id="audio"></audio>

    <div class="portfolio">
        <div class="avatar-container">
            <div class="avatar-ring"></div>
            <img src="https://avatars.githubusercontent.com/u/287488639?v=4" alt="avatar" class="avatar">
        </div>
        
        <div class="nickname">
            <h1>@1freshfork</h1>
        </div>

        <div class="links">
            <a href="https://t.me/freshfork" target="_blank" class="social-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/3840px-Telegram_logo.svg.png" alt="tg">
            </a>
            <a href="https://github.com/1freshfork/" target="_blank" class="social-btn">
                <img src="https://images.icon-icons.com/3685/PNG/512/github_logo_icon_229278.png" alt="gh">
            </a>
            <a href="https://vk.com/freshfork" target="_blank" class="social-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/VK_Compact_Logo_%282021-present%29.svg/3840px-VK_Compact_Logo_%282021-present%29.svg.png?utm_source=ru.wikiquote.org&utm_campaign=index&utm_content=thumbnail" alt="vk">
            </a>   
        </div>

        <div class="music">
            <div class="music-header-row">
                <div class="cover-wrapper" id="music-cover">
                    <img src="files/cover.png" alt="cover" id="cover-img">
                </div>
                <div class="track-details">
                    <div class="track-title" id="track-title">Тело похудело</div>
                    <div class="track-author" id="track-author">КОРЗА</div>
                </div>
                <div class="btn-playlist-toggle" id="btn-playlist">
                    <span class="material-symbols-rounded">queue_music</span>
                </div>
            </div>

            <div class="progress-area">
                <div class="progress-bar-bg" id="progress-container">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>

            <div class="controls">
                <div class="ctrl-btn" id="btn-back">
                    <span class="material-symbols-rounded">skip_previous</span>
                </div>
                
                <div class="ctrl-btn play-pause-btn" id="btn-play">
                    <span class="material-symbols-rounded">play_arrow</span>
                </div>
                <div class="ctrl-btn play-pause-btn" id="btn-pause" style="display: none;">
                    <span class="material-symbols-rounded pause-icon" style="display:block">pause</span>
                </div>

                <div class="ctrl-btn" id="btn-forward">
                    <span class="material-symbols-rounded">skip_next</span>
                </div>
            </div>

            <div class="playlist-dropdown" id="playlist-dropdown"></div>
        </div>
    </div>

    <script>
        const playlist = [
            { title: "Тело похудело", author: "КОРЗА", cover: "files/cover.png", src: "files/music.mp3" },
            { title: "КАЗАНТИП 2007", author: "дмитрий уткин, 2nd.gf", cover: "files/cover2.png", src: "files/music-2.mp3" },
            { title: "Пообещай", author: "влад пиво, ЯРЧЕ СОЛНЦА, besoboy", cover: "files/cover3.png", src: "files/music-3.mp3" },
            { title: "Sleep Mode", author: "onda andar", cover: "files/cover4.png", src: "files/music-4.mp3" }
        ];

        let currentTrackIndex = 0;
        let isPlaying = false;
        let isInitialLoad = true;

        const audio = document.getElementById('audio');
        const btnPlay = document.getElementById('btn-play');
        const btnPause = document.getElementById('btn-pause');
        const btnBack = document.getElementById('btn-back');
        const btnForward = document.getElementById('btn-forward');
        const btnPlaylist = document.getElementById('btn-playlist');
        const playlistDropdown = document.getElementById('playlist-dropdown');
        
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const musicCover = document.getElementById('music-cover');
        const coverImg = document.getElementById('cover-img');
        const trackTitle = document.getElementById('track-title');
        const trackAuthor = document.getElementById('track-author');

        function renderPlaylist() {
            playlistDropdown.innerHTML = '';
            playlist.forEach((track, index) => {
                const item = document.createElement('div');
                item.classList.add('playlist-item');
                if (index === currentTrackIndex) item.classList.add('current');

                item.innerHTML = `
                    <div class="item-info">
                        <span class="item-title">${track.title}</span>
                        <span class="item-author">${track.author}</span>
                    </div>
                    ${index === currentTrackIndex && isPlaying ? '<span class="material-symbols-rounded" style="color:var(--primary); font-size:18px;">equalizer</span>' : ''}
                `;
                item.addEventListener('click', () => toggleTrackFromList(index));
                playlistDropdown.appendChild(item);
            });
        }

        function loadTrack(index) {
            currentTrackIndex = index;
            const track = playlist[currentTrackIndex];
            audio.src = track.src;
            coverImg.src = track.cover;
            trackTitle.textContent = track.title;
            trackAuthor.textContent = track.author;
            progressBar.style.width = '0%';
            
            localStorage.setItem('audio_current_index', index);
            renderPlaylist();
        }

        function playTrack() {
            audio.play().then(() => {
                isPlaying = true;
                updatePlayPauseUI(true);
                musicCover.classList.add('playing');
                renderPlaylist();
            }).catch(err => {
                console.log("Autoplay blocked");
                isPlaying = false;
                updatePlayPauseUI(false);
            });
        }

        function pauseTrack() {
            audio.pause();
            isPlaying = false;
            updatePlayPauseUI(false);
            musicCover.classList.remove('playing');
            renderPlaylist();
        }

        function updatePlayPauseUI(playing) {
            if (playing) {
                btnPlay.style.display = 'none';
                btnPause.style.display = 'flex';
            } else {
                btnPause.style.display = 'none';
                btnPlay.style.display = 'flex';
            }
        }

        window.toggleTrackFromList = function(index) {
            if (currentTrackIndex === index) {
                if (isPlaying) pauseTrack();
                else playTrack();
            } else {
                isInitialLoad = false;
                loadTrack(index);
                playTrack();
            }
        };

        btnPlay.addEventListener('click', () => { isInitialLoad = false; playTrack(); });
        btnPause.addEventListener('click', pauseTrack);

        btnBack.addEventListener('click', () => {
            isInitialLoad = false;
            let index = currentTrackIndex - 1;
            if (index < 0) index = playlist.length - 1;
            loadTrack(index);
            playTrack();
        });

        btnForward.addEventListener('click', () => {
            isInitialLoad = false;
            let index = currentTrackIndex + 1;
            if (index >= playlist.length) index = 0;
            loadTrack(index);
            playTrack();
        });

        btnPlaylist.addEventListener('click', () => {
            playlistDropdown.classList.toggle('show');
            btnPlaylist.classList.toggle('active');
        });

        audio.addEventListener('loadedmetadata', () => {
            if (isInitialLoad) {
                const savedTime = localStorage.getItem('audio_current_time');
                if (savedTime) {
                    audio.currentTime = parseFloat(savedTime);
                    const progressPercent = (audio.currentTime / audio.duration) * 100;
                    progressBar.style.width = `${progressPercent}%`;
                }
                isInitialLoad = false;
            }
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
                localStorage.setItem('audio_current_time', audio.currentTime);
            }
        });

        progressContainer.addEventListener('click', (e) => {
            isInitialLoad = false;
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if (duration) audio.currentTime = (clickX / width) * duration;
        });

        audio.addEventListener('ended', () => {
            isInitialLoad = false;
            let index = currentTrackIndex + 1;
            if (index >= playlist.length) index = 0;
            loadTrack(index);
            playTrack();
        });

        // Init
        const savedIndex = localStorage.getItem('audio_current_index');
        if (savedIndex !== null && playlist[savedIndex]) {
            loadTrack(parseInt(savedIndex));
        } else {
            loadTrack(0);
        }
        playTrack();
    </script>
</body>
</html>
