<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝓯𝓻𝓮𝓼𝓱𝓯𝓸𝓻𝓴 / 𝓭𝓮𝓿𝓮𝓵𝓸𝓹𝓮𝓻</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        :root {
            --bg-glass: rgba(255, 255, 255, 0.07);
            --border-glass: rgba(255, 255, 255, 0.1);
            --accent-color: #00ffcc;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0a0a0c;
            color: var(--text-main);
            font-family: 'Google Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Задний фон */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4) blur(4px);
        }

        /* Главная карточка портфолио */
        .portfolio {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1.2s ease-out;
            position: relative;
        }

        /* Аватар */
        .avatar {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar:hover img {
            transform: scale(1.08);
            border-color: var(--accent-color);
        }

        /* Никнейм */
        .nickname h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.8rem;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #fff, var(--text-sub));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        /* Социальные кнопки */
        .links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
        }

        .links a {
            text-decoration: none;
        }

        .links button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            width: 55px;
            height: 55px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .links button img {
            width: 26px;
            height: 26px;
            transition: transform 0.3s ease;
        }

        .links button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-color);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.15);
        }

        .links button:hover img {
            transform: scale(1.1);
        }

        /* Музыкальный плеер */
        .music {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .cover {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover.playing {
            animation: rotateCover 12s linear infinite;
        }

        /* Текст песни */
        .music-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .music-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .music-name {
            text-align: left;
            flex: 1;
            padding-right: 10px;
        }

        .music-name h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }

        .author {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: var(--text-sub);
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }

        /* Кнопка списка */
        .btn-playlist-toggle {
            cursor: pointer;
            color: var(--text-sub);
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-playlist-toggle:hover, .btn-playlist-toggle.active {
            color: var(--accent-color);
            transform: scale(1.1);
        }

        /* Выпадающий список треков */
        .playlist-dropdown {
            display: none;
            background: rgba(10, 10, 12, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 15px;
            padding: 10px;
            margin-top: 10px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            animation: fadeIn 0.3s ease-out;
            flex-direction: column;
            gap: 8px;
        }

        .playlist-dropdown.show {
            display: flex;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.2s ease;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .playlist-item.current {
            border-left: 3px solid var(--accent-color);
            background: rgba(0, 255, 204, 0.05);
        }

        .item-info {
            display: flex;
            flex-direction: column;
            max-width: 240px;
        }

        .item-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-author {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            color: var(--text-sub);
        }

        .item-btn {
            cursor: pointer;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .item-btn:hover {
            color: var(--text-main);
        }

        .playlist-item.current .item-btn {
            color: var(--accent-color);
        }

        /* Кастомный Прогресс-бар */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffcc, #0077ff);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        /* Кнопки управления */
        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 5px;
        }

        .buttons > div {
            cursor: pointer;
            color: var(--text-sub);
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .buttons > div:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        .buttons .play, .buttons .pause {
            background: #ffffff;
            color: #000000;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        .buttons .play:hover, .buttons .pause:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4);
        }

        .buttons .pause {
            display: none;
        }

        /* Скроллбар для списка */
        .playlist-dropdown::-webkit-scrollbar {
            width: 4px;
        }
        .playlist-dropdown::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .playlist-dropdown::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes rotateCover {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <audio id="audio" src="files/music.mp3"></audio>

    <div class="portfolio">
        <div class="avatar">
            <img src="https://avatars.githubusercontent.com/u/287488639?v=4" alt="avatar">
        </div>
        <div class="nickname">
            <h1>@1freshfork</h1>
        </div>
        <div class="links">
            <a href="https://t.me/freshfork" target="_blank"><button><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/3840px-Telegram_logo.svg.png" alt="telegram ico"></button></a>
            <a href="https://github.com/1freshfork/" target="_blank"><button><img src="https://images.icon-icons.com/3685/PNG/512/github_logo_icon_229278.png" alt="github ico"></button></a>
            <a href="https://vk.com/freshfork" target="_blank"><button><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/VK_Compact_Logo_%282021-present%29.svg/3840px-VK_Compact_Logo_%282021-present%29.svg.png?utm_source=ru.wikiquote.org&utm_campaign=index&utm_content=thumbnail" alt="vk ico"></button></a>   
        </div>
        <div class="music">
            <div class="cover" id="music-cover">
                <img src="files/cover.png" alt="cover" id="cover-img">
            </div>
            <div class="music-info">
                <div class="music-header">
                    <div class="music-name">
                        <h2 id="track-title">Тело похудело</h2>
                        <div class="author">
                            <p id="track-author">КОРЗА</p>
                        </div>
                    </div>
                    <div class="btn-playlist-toggle" id="btn-playlist">
                        <span class="material-symbols-outlined">list</span>
                    </div>
                </div>

                <div class="playlist-dropdown" id="playlist-dropdown">
                    </div>

                <div class="progress-container" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="buttons">
                    <div class="back" id="btn-back">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </div>
                    <div class="play" id="btn-play">
                        <span class="material-symbols-outlined">play_arrow</span>
                    </div>
                    <div class="pause" id="btn-pause">
                        <span class="material-symbols-outlined">pause</span>
                    </div>
                    <div class="forward" id="btn-forward">
                        <span class="material-symbols-outlined">arrow_forward</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="background">
        <img src="files/background.gif" alt="background">
    </div>

    <script>
        // База данных треков
        const playlist = [
            { title: "Тело похудело", author: "КОРЗА", cover: "files/cover.png", src: "files/music.mp3" },
            { title: "КАЗАНТИП 2007", author: "дмитрий уткин, 2nd.gf", cover: "files/cover2.png", src: "files/music-2.mp3" },
            { title: "Пообещай", author: "влад пиво, ЯРЧЕ СОЛНЦА, besoboy", cover: "files/cover3.png", src: "files/music-3.mp3" },
            { title: "дым", author: "67pain, JosyDROPP", cover: "files/cover4.png", src: "files/music-4.mp3" }
        ];

        let currentTrackIndex = 0;
        let isPlaying = false;

        const audio = document.getElementById('audio');
        const btnPlay = document.getElementById('btn-play');
        const btnPause = document.getElementById('btn-pause');
        const btnBack = document.getElementById('btn-back');
        const btnForward = document.getElementById('btn-forward');
        const btnPlaylist = document.getElementById('btn-playlist');
        const playlistDropdown = document.getElementById('playlist-dropdown');
        
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const musicCover = document.getElementById('music-cover');
        const coverImg = document.getElementById('cover-img');
        const trackTitle = document.getElementById('track-title');
        const trackAuthor = document.getElementById('track-author');

        // Инициализация списка в интерфейсе
        function renderPlaylist() {
            playlistDropdown.innerHTML = '';
            playlist.forEach((track, index) => {
                const item = document.createElement('div');
                item.classList.add('playlist-item');
                if (index === currentTrackIndex) item.classList.add('current');

                // Определяем правильную иконку для трека в списке
                const icon = (index === currentTrackIndex && isPlaying) ? 'pause' : 'play_arrow';

                item.innerHTML = `
                    <div class="item-info">
                        <span class="item-title">${track.title}</span>
                        <span class="item-author">${track.author}</span>
                    </div>
                    <div class="item-btn" onclick="toggleTrackFromList(${index})">
                        <span class="material-symbols-outlined">${icon}</span>
                    </div>
                `;
                playlistDropdown.appendChild(item);
            });
        }

        // Загрузка трека
        function loadTrack(index) {
            currentTrackIndex = index;
            const track = playlist[currentTrackIndex];
            audio.src = track.src;
            coverImg.src = track.cover;
            trackTitle.textContent = track.title;
            trackAuthor.textContent = track.author;
            progressBar.style.width = '0%';
        }

        // Play
        function playTrack() {
            audio.play().then(() => {
                isPlaying = true;
                btnPlay.style.display = 'none';
                btnPause.style.display = 'flex';
                musicCover.classList.add('playing');
                renderPlaylist();
            }).catch(err => console.log("Ошибка воспроизведения:", err));
        }

        // Pause
        function pauseTrack() {
            audio.pause();
            isPlaying = false;
            btnPause.style.display = 'none';
            btnPlay.style.display = 'flex';
            musicCover.classList.remove('playing');
            renderPlaylist();
        }

        // Переключение из интерфейса списка
        window.toggleTrackFromList = function(index) {
            if (currentTrackIndex === index) {
                if (isPlaying) pauseTrack();
                else playTrack();
            } else {
                loadTrack(index);
                playTrack();
            }
        };

        // События кнопок плеера
        btnPlay.addEventListener('click', playTrack);
        btnPause.addEventListener('click', pauseTrack);

        // Кнопка Назад (предыдущий трек)
        btnBack.addEventListener('click', () => {
            let index = currentTrackIndex - 1;
            if (index < 0) index = playlist.length - 1;
            loadTrack(index);
            if (isPlaying) playTrack();
            else renderPlaylist();
        });

        // Кнопка Вперед (следующий трек)
        btnForward.addEventListener('click', () => {
            let index = currentTrackIndex + 1;
            if (index >= playlist.length) index = 0;
            loadTrack(index);
            if (isPlaying) playTrack();
            else renderPlaylist();
        });

        // Открытие/Закрытие плейлиста
        btnPlaylist.addEventListener('click', () => {
            playlistDropdown.classList.toggle('show');
            btnPlaylist.classList.toggle('active');
        });

        // Обновление прогресс-бара
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
            }
        });

        // Перемотка кликом по прогресс-бару
        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if (duration) {
                audio.currentTime = (clickX / width) * duration;
            }
        });

        // Автопереключение на следующий трек по окончании текущего
        audio.addEventListener('ended', () => {
            let index = currentTrackIndex + 1;
            if (index >= playlist.length) index = 0;
            loadTrack(index);
            playTrack();
        });

        // Первичный рендеринг при старте страницы
        renderPlaylist();
    </script>
</body>
</html>
